name: smart-inbox-env
description: >
  A real-world email triage environment where an AI agent must classify emails,
  decide actions (reply, ignore, escalate), and generate responses.

version: "1.0"

entry_point: env.environment:SmartInboxEnv

tasks:
-name: easy
 description: Classify the email correctly (reward 0–1 based on accuracy)
-name: medium
 description: Classify and choose the correct action (partial reward split)
-name: hard
 description: Full email handling including classification, action, and response generation (multi-component reward)

observation_space:
  type: EmailObservation
  description: Structured email data including sender, subject, body, timestamp, and priority hint

action_space:
  type: EmailAction
  description: Classification, action decision, and optional response generation

reward:
  type: EmailReward
  range: [0.0, 1.0]
  description: Reward based on classification accuracy, action correctness, and response quality

tags:
  - openenv
  - email
  - automation
  - ai-training

author: Your Name
license: MIT


